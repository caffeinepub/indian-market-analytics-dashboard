// ─── MOCK DATA GENERATORS ────────────────────────────────────────────────────
function rnd(min, max) { return min + Math.random() * (max - min); }
function rndi(min, max) { return Math.floor(rnd(min, max)); }
function seed(n) { let x = Math.sin(n) * 10000; return x - Math.floor(x); }

function genDates(days, toDate = new Date('2026-03-03')) {
  const dates = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(toDate);
    d.setDate(d.getDate() - i);
    if (d.getDay() !== 0 && d.getDay() !== 6) dates.push(d);
  }
  return dates;
}

function formatDate(d) {
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
}
function formatDateFull(d) {
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function genPriceSeries(days, base, volatility) {
  const dates = genDates(days + 40);
  const result = [];
  let close = base;
  for (const d of dates) {
    const change = (Math.random() - 0.48) * volatility;
    const open = close * (1 + (Math.random() - 0.5) * 0.002);
    const high = Math.max(open, close * (1 + Math.random() * 0.012));
    const low = Math.min(open, close * (1 - Math.random() * 0.012));
    close = open + change;
    result.push({ date: d, open: +open.toFixed(2), high: +high.toFixed(2), low: +low.toFixed(2), close: +close.toFixed(2) });
  }
  return result;
}

function genPCRSeries(dates) {
  let pcr = 0.9;
  return dates.map(d => {
    pcr = Math.max(0.5, Math.min(1.5, pcr + (Math.random() - 0.49) * 0.05));
    return { date: d, pcr: +pcr.toFixed(3) };
  });
}

function genOIData(atm, step, count, expiryType) {
  const strikes = [];
  const half = Math.floor(count / 2);
  for (let i = -half; i <= half; i++) strikes.push(atm + i * step);
  return strikes.map((s, idx) => {
    const dist = Math.abs(idx - half) / half;
    const base = Math.max(0, 1 - dist * dist) * 5e6;
    const callOI = Math.floor(base * (0.7 + Math.random() * 0.6) + rnd(1e5, 8e5));
    const putOI = Math.floor(base * (0.7 + Math.random() * 0.6) + rnd(1e5, 8e5));
    return { strike: s, callOI, putOI };
  });
}

function calcMaxPain(oiData) {
  let minLoss = Infinity, maxPainStrike = oiData[0].strike;
  for (const { strike } of oiData) {
    let loss = 0;
    for (const d of oiData) {
      if (d.strike < strike) loss += (strike - d.strike) * d.callOI;
      if (d.strike > strike) loss += (d.strike - strike) * d.putOI;
    }
    if (loss < minLoss) { minLoss = loss; maxPainStrike = strike; }
  }
  return maxPainStrike;
}

  const days = { '1W': 7, '1M': 22, '3M': 66, '6M': 132, '1Y': 252 };

      volume: rndi(500000, 8000000)

    v = Math.max(base * 0.85, Math.min(base * 1.15, v + (Math.random() - 0.49) * vol));

}

// Monthly macro (24 months back from Mar 2026)
function genMonthlyDates(n) {
  const dates = [];

  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(base);
    d.setMonth(d.getMonth() - i);
    dates.push(d);
  }
  return dates;
}

}

function PCRBox({ index }) {
  const isNifty = index === 'Nifty 50';
  const expiries = isNifty ? ['CW','NW','CM','NM'] : ['CM','NM'];
  const [selected, setSelected] = useState(isNifty ? {CW:true,NW:false,CM:true,NM:false} : {CM:true,NM:false});
  const pcrData = isNifty ? NIFTY_PCR : BANKNIFTY_PCR;
  const [range, setRange] = useState('1M');

  useEffect(() => {
    setSelected(isNifty ? {CW:true,NW:false,CM:true,NM:false} : {CM:true,NM:false});
  }, [index]);

  const rawDays = { '1W':7,'1M':22,'3M':66,'6M':132 };
  const days = rawDays[range] || 22;
  const activeExpiries = expiries.filter(e => selected[e]);

  const merged = useMemo(() => {
    if (!activeExpiries.length) return [];
    const base = pcrData[activeExpiries[0]].slice(-days);
    return base.map((item, i) => {
      const obj = { date: formatDate(item.date) };
      activeExpiries.forEach(e => {
        const arr = pcrData[e].slice(-days);
        obj[e] = arr[i]?.pcr;
      });
      return obj;
    });
  }, [activeExpiries, days, pcrData]);

  return (
    <div className="card" style={{flex:1}}>
      <div className="flex between items-center mb-3">
        <h2>PCR (Put-Call Ratio)</h2>
        <span style={{fontSize:12,color:'#94a3b8'}}>{index}</span>
      </div>
      <div className="flex gap-2 wrap mb-3">
        {['1W','1M','3M','6M'].map(r => (
          <button key={r} className={`range-btn ${range===r?'active':''}`} onClick={()=>setRange(r)} data-ocid={`pcr.range.${r.toLowerCase()}.toggle`}>{r}</button>
        ))}
      </div>
      <div className="flex gap-3 wrap mb-3">
        {expiries.map(e => (
          <label key={e} style={{display:'flex',alignItems:'center',gap:4}}>
            <input type="checkbox" checked={!!selected[e]} onChange={ev => setSelected(s => ({...s, [e]: ev.target.checked}))} data-ocid={`pcr.${e.toLowerCase()}.checkbox`} />
            <span style={{color: EXPIRY_COLORS[e], fontWeight:500}}>{e}</span>
          </label>
        ))}
      </div>
      {merged.length === 0 ? (
        <div style={{height:240,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b'}}>Select at least one expiry</div>
      ) : (
        <ResponsiveContainer width="100%" height={240}>
          <LineChart data={merged} margin={{top:4,right:8,bottom:0,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
            <XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} interval="preserveStartEnd" />
            <YAxis tick={{fontSize:10,fill:'#64748b'}} domain={[0.4,1.6]} width={36} />
            <Tooltip {...tooltipStyle} />
            <Legend wrapperStyle={{fontSize:11}} />
            <ReferenceLine y={1} stroke="#475569" strokeDasharray="4 4" />
            {activeExpiries.map(e => (
              <Line key={e} type="monotone" dataKey={e} stroke={EXPIRY_COLORS[e]} dot={false} strokeWidth={2} />
            ))}
          </LineChart>
        </ResponsiveContainer>
      )}
    </div>
  );
}

function StockSearch({ value, onChange }) {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = useMemo(() => {
    const q = query.toLowerCase();
    if (!q) return STOCKS.slice(0, 30);
    return STOCKS.filter(s => s.sym.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)).slice(0, 30);
  }, [query]);

  const current = STOCKS.find(s => s.sym === value) || STOCKS[0];

  return (
    <div className="search-container" ref={ref}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>

      {open && (
        <div className="search-dropdown" style={{top:48,left:72}}>

    date: formatDate(d.date), close: d.close, open: d.open, high: d.high, low: d.low, volume: d.volume,
  })), [rawData, range]);
  const last = rawData[rawData.length - 1];
  const prev = rawData[rawData.length - 2];
  const chg = last.close - prev.close;
  const chgPct = (chg / prev.close * 100).toFixed(2);

  return (
    <div className="card">
      <div className="flex between items-center mb-2">
        <h2>{sym} — Price & Volume</h2>
        <div className="flex gap-2">
          {['1W','1M','3M','6M'].map(r => (
            <button key={r} className={`range-btn ${range===r?'active':''}`} onClick={()=>setRange(r)} data-ocid={`stock.range.${r.toLowerCase()}.toggle`}>{r}</button>
          ))}
        </div>
      </div>
      <div className="flex gap-3 wrap mb-3">
        {[['OPEN',last.open],['HIGH',last.high,'positive'],['LOW',last.low,'negative'],['CLOSE',last.close],['VOL',last.volume]].map(([l,v,cls]) => (
          <div key={l} className="stat-badge">
            <div className="text-xs text-muted">{l}</div>
            <div className={cls} style={{fontWeight:600, color: l==='CLOSE'?(chg>=0?'#22c55e':'#ef4444'):undefined}}>
              {l === 'VOL' ? (v/1e5).toFixed(2)+'L' : v.toLocaleString('en-IN',{maximumFractionDigits:2})}
              {l==='CLOSE' && <span style={{fontSize:11,marginLeft:4}}>({chg>=0?'+':''}{chgPct}%)</span>}
            </div>
          </div>
        ))}
      </div>
      <ResponsiveContainer width="100%" height={180}>
        <LineChart data={data} margin={{top:4,right:8,bottom:0,left:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
          <XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} interval="preserveStartEnd" />
          <YAxis tick={{fontSize:10,fill:'#64748b'}} domain={['auto','auto']} width={55} tickFormatter={v=>v.toLocaleString('en-IN',{maximumFractionDigits:0})} />
          <Tooltip {...tooltipStyle} formatter={(v,n)=>[v.toLocaleString('en-IN',{maximumFractionDigits:2}), n]} />
          <Line type="monotone" dataKey="close" stroke="#3b82f6" dot={false} strokeWidth={2} name="Close" />
        </LineChart>
      </ResponsiveContainer>
      <div style={{marginTop:8}}>
        <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>Volume</div>
        <ResponsiveContainer width="100%" height={80}>
          <BarChart data={data} margin={{top:0,right:8,bottom:0,left:0}}>
            <XAxis dataKey="date" tick={{fontSize:9,fill:'#64748b'}} interval="preserveStartEnd" />
            <YAxis tick={{fontSize:9,fill:'#64748b'}} tickFormatter={v=>(v/1e5).toFixed(0)+'L'} width={36} />
            <Tooltip {...tooltipStyle} formatter={(v)=>[(v/1e5).toFixed(2)+'L','Volume']} />
            <Bar dataKey="volume" fill="#1d4ed8" radius={[2,2,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function StockOptionsBox({ sym }) {
  const [selected, setSelected] = useState({CM:true, NM:false});
  const [oiExpiry, setOiExpiry] = useState('CM');
  const activeExpiries = ['CM','NM'].filter(e => selected[e]);

  const merged = useMemo(() => {
    if (!activeExpiries.length) return [];
    const base = getStockPCR(sym, activeExpiries[0]).slice(-44);
    return base.map((item, i) => {
      const obj = { date: formatDate(item.date) };
      activeExpiries.forEach(e => {
        const arr = getStockPCR(sym, e).slice(-44);
        obj[e] = arr[i]?.pcr;
      });
      return obj;
    });
  }, [activeExpiries, sym]);

  const oiData = useMemo(() => getStockOI(sym, oiExpiry), [sym, oiExpiry]);
  const maxPain = useMemo(() => calcMaxPain(oiData), [oiData]);

  return (
    <div className="card">
      <div className="flex between items-center mb-3">
        <h2>{sym} — Options OI & PCR</h2>
        <div className="flex gap-3">
          {['CM','NM'].map(e => (
            <label key={e} style={{display:'flex',alignItems:'center',gap:4}}>
              <input type="checkbox" checked={!!selected[e]} onChange={ev=>setSelected(s=>({...s,[e]:ev.target.checked}))} data-ocid={`stoption.${e.toLowerCase()}.checkbox`} />
              <span style={{color:EXPIRY_COLORS[e],fontWeight:500,fontSize:13}}>{e}</span>
            </label>
          ))}
        </div>
      </div>
      {merged.length > 0 ? (
        <ResponsiveContainer width="100%" height={160}>
          <LineChart data={merged} margin={{top:4,right:8,bottom:0,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
            <XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} interval="preserveStartEnd" />
            <YAxis tick={{fontSize:10,fill:'#64748b'}} domain={[0.4,1.6]} width={36} />
            <Tooltip {...tooltipStyle} />
            <Legend wrapperStyle={{fontSize:11}} />
            <ReferenceLine y={1} stroke="#475569" strokeDasharray="4 4" />
            {activeExpiries.map(e => (
              <Line key={e} type="monotone" dataKey={e} stroke={EXPIRY_COLORS[e]} dot={false} strokeWidth={2} />
            ))}
          </LineChart>
        </ResponsiveContainer>
      ) : <div style={{height:160,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b'}}>Select an expiry</div>}
      <div className="flex between items-center mt-3 mb-2">
        <h3>OI by Strike</h3>
        <div className="flex gap-2">
          {['CM','NM'].map(e => (
            <button key={e} className={`pill-tab ${oiExpiry===e?'active':''}`} onClick={()=>setOiExpiry(e)} data-ocid={`stoption.oiexpiry.${e.toLowerCase()}.tab`}>{e}</button>
          ))}
        </div>
      </div>
      <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>Max Pain: <span style={{color:'#eab308',fontWeight:600}}>{maxPain.toLocaleString('en-IN')}</span></div>
      <ResponsiveContainer width="100%" height={160}>
        <BarChart data={oiData} margin={{top:4,right:4,bottom:0,left:0}} barCategoryGap={2}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
          <XAxis dataKey="strike" tick={{fontSize:8,fill:'#64748b'}} interval={3} />
          <YAxis tick={{fontSize:8,fill:'#64748b'}} tickFormatter={fmtK} width={36} />
          <Tooltip {...tooltipStyle} formatter={(v,n)=>[fmtK(v),n]} />
          <Legend wrapperStyle={{fontSize:10}} />
          <Bar dataKey="callOI" name="Call OI" fill="#22c55e" radius={[2,2,0,0]} />
          <Bar dataKey="putOI" name="Put OI" fill="#ef4444" radius={[2,2,0,0]} />
        </BarChart>
      </ResponsiveContainer>

}

function DailyIndicatorsBox() {
  const indicators = Object.keys(MACRO_DAILY);

  const rawData = MACRO_DAILY[selected];
  const data = useMemo(() => filterByRange(rawData, range).map(d => ({
    date: formatDate(d.date), value: d.value,
  })), [rawData, range]);
  const unit = MACRO_DAILY_UNITS[selected];
  const last = rawData[rawData.length-1];
  const prev = rawData[rawData.length-2];
  const chg = last.value - prev.value;
  const isPositive = selected === 'FII Data' || selected === 'DII Data' ? chg >= 0 : chg >= 0;

  return (
    <div className="card">
      <h2 style={{marginBottom:12}}>Daily Indicators</h2>
      <div style={{display:'flex',gap:12}}>
        <div className="sidebar-nav">
          {indicators.map(ind => (
            <button key={ind} className={`sidebar-btn ${selected===ind?'active':''}`} onClick={()=>setSelected(ind)} data-ocid={`macro.daily.${ind.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.button`}>{ind}</button>
          ))}
        </div>
        <div style={{flex:1}}>
          <div className="flex between items-center mb-2">
            <span style={{color:'#94a3b8',fontSize:13}}>{selected} ({unit})</span>
            <div className="flex gap-2">
              {['1M','3M','6M','1Y'].map(r => (
                <button key={r} className={`range-btn ${range===r?'active':''}`} onClick={()=>setRange(r)} data-ocid={`macro.daily.range.${r.toLowerCase()}.toggle`}>{r}</button>
              ))}
            </div>
          </div>
          <div className="flex gap-3 wrap mb-2">
            <div className="stat-badge">
              <div className="text-xs text-muted">LATEST</div>
              <div style={{fontWeight:600}}>{last.value.toLocaleString('en-IN',{maximumFractionDigits:3})}</div>
            </div>
            <div className="stat-badge">
              <div className="text-xs text-muted">CHANGE</div>
              <div className={chg >= 0 ? 'positive' : 'negative'} style={{fontWeight:600}}>
                {chg >= 0 ? '+' : ''}{chg.toFixed(3)}
              </div>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={240}>
            <LineChart data={data} margin={{top:4,right:8,bottom:0,left:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
              <XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} interval="preserveStartEnd" />

              <Tooltip {...tooltipStyle} formatter={(v)=>[v.toLocaleString('en-IN',{maximumFractionDigits:3}),selected]} />

              <Line type="monotone" dataKey="value" stroke="#3b82f6" dot={false} strokeWidth={2} name={selected} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// TAB 4: FORTNIGHTLY SECTOR WISE FII DATA
// ═══════════════════════════════════════════════════════════════════════════════
function SectorFIIChart({ selectedSectors, onToggleSector, onSelectAll, onClearAll }) {
  const sectorColorMap = useMemo(() => {
    const map = {};
    SECTORS.forEach((s,i) => { map[s] = SECTOR_COLORS[i]; });
    return map;
  }, []);

  const merged = useMemo(() => {
    if (!selectedSectors.length) return FORTNIGHT_DATES.map(d => ({ date: d }));
    return FORTNIGHT_DATES.map((d, i) => {
      const obj = { date: d };
      selectedSectors.forEach(sec => {
        obj[sec] = SECTOR_FII_DATA[sec][i]?.value;
      });
      return obj;
    });
  }, [selectedSectors]);

  return (
    <div className="card">
      <div className="flex between items-center mb-3">
        <h2>Sector FII Flows (Fortnightly)</h2>
        <div className="flex gap-2">
          <button className="action-btn" onClick={onSelectAll} data-ocid="sector.selectall.button">Select All</button>
          <button className="action-btn" onClick={onClearAll} data-ocid="sector.clearall.button">Clear All</button>
        </div>
      </div>
      <div className="flex gap-2 wrap mb-3">
        {SECTORS.map((sec,i) => (
          <label key={sec} style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:4,border:`1px solid ${selectedSectors.includes(sec)?SECTOR_COLORS[i]:'#334155'}`,background:selectedSectors.includes(sec)?`${SECTOR_COLORS[i]}22`:'transparent'}}>
            <input type="checkbox" checked={selectedSectors.includes(sec)} onChange={()=>onToggleSector(sec)} data-ocid={`sector.${sec.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.checkbox`} />
            <span style={{fontSize:11,color: selectedSectors.includes(sec)?SECTOR_COLORS[i]:'#94a3b8',whiteSpace:'nowrap'}}>{sec}</span>
          </label>
        ))}
      </div>
      {selectedSectors.length === 0 ? (
        <div style={{height:280,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b'}}>Select sectors to view FII flows</div>
      ) : (
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={merged} margin={{top:4,right:8,bottom:0,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
            <XAxis dataKey="date" tick={{fontSize:10,fill:'#64748b'}} />
            <YAxis tick={{fontSize:10,fill:'#64748b'}} tickFormatter={v=>`${(v/1000).toFixed(0)}K`} width={45} />
            <Tooltip {...tooltipStyle} formatter={(v,n)=>[`₹${v?.toLocaleString('en-IN')} Cr`, n]} />
            <Legend wrapperStyle={{fontSize:10}} />
            <ReferenceLine y={0} stroke="#475569" />
            {selectedSectors.map((sec,i) => (
              <Line key={sec} type="monotone" dataKey={sec} stroke={sectorColorMap[sec]} dot={false} strokeWidth={2} />
            ))}
          </LineChart>
        </ResponsiveContainer>
      )}
    </div>
  );
}

function SectorStocksTable({ selectedSectors }) {
  const [activeSector, setActiveSector] = useState(null);
  useEffect(() => {
    if (selectedSectors.length > 0 && !selectedSectors.includes(activeSector)) {
      setActiveSector(selectedSectors[0]);
    }
    if (selectedSectors.length === 0) setActiveSector(null);
  }, [selectedSectors]);

  const stocks = useMemo(() => {
    if (!activeSector) return [];
    return SECTOR_REAL_STOCKS[activeSector] || SECTOR_STOCKS[activeSector] || [];
  }, [activeSector]);

  return (
    <div className="card">
      <h2 style={{marginBottom:12}}>Stocks in Sector</h2>
      {selectedSectors.length === 0 ? (
        <div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b'}}>Select sectors from the chart above</div>
      ) : (
        <>
          <div className="flex gap-2 wrap mb-3">
            {selectedSectors.map(sec => (
              <button key={sec} className={`pill-tab ${activeSector===sec?'active':''}`} onClick={()=>setActiveSector(sec)} data-ocid={`sector.stocks.${sec.replace(/[^a-z0-9]/gi,'_').toLowerCase()}.tab`}>{sec}</button>
            ))}
          </div>
          {activeSector && (
            <div className="table-wrap" data-ocid="sector.stocks.table">
              <table>
                <thead>
                  <tr>
                    <th>Stock Name</th>
                    <th>Symbol</th>
                    <th>FII Holding %</th>
                    <th>Change (FN)</th>
                    <th>Net FII Flow (₹ Cr)</th>
                  </tr>
                </thead>
                <tbody>
                  {stocks.map((s,i) => (
                    <tr key={i} data-ocid={`sector.stocks.row.${i+1}`}>
                      <td>{s.name}</td>
                      <td><span className="badge badge-green">{s.symbol}</span></td>
                      <td>{s.holding}%</td>
                      <td>
                        <span style={{color: s.change >= 0 ? '#22c55e' : '#ef4444', fontWeight:600}}>
                          {s.change >= 0 ? '+' : ''}{s.change}%
                        </span>
                      </td>
                      <td style={{color: s.netFlow >= 0 ? '#22c55e' : '#ef4444', fontWeight:500}}>
                        {s.netFlow >= 0 ? '+' : ''}₹{Math.abs(s.netFlow).toLocaleString('en-IN')}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function Tab4() {
  const [selectedSectors, setSelectedSectors] = useState(['Financial Services','Information Technology']);
  const toggleSector = useCallback(sec => {
    setSelectedSectors(prev => prev.includes(sec) ? prev.filter(s => s !== sec) : [...prev, sec]);
  }, []);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <SectorFIIChart selectedSectors={selectedSectors} onToggleSector={toggleSector} onSelectAll={()=>setSelectedSectors([...SECTORS])} onClearAll={()=>setSelectedSectors([])} />
      <SectorStocksTable selectedSectors={selectedSectors} />
    </div>
  );
}
